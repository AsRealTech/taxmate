packages:
  "framer-motion": "For beautiful page transitions and micro-interactions"
  "recharts": "For visualizing tax and income/expense data over time"
  "date-fns": "For formatting dates easily in a human-readable way"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility function to efficiently merge Tailwind CSS classes"
  "lucide-react": "Beautiful, consistent icons"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "Zod resolver for react-hook-form"

images:
  - path: "artifacts/taxmate/public/images/dashboard-pattern.png"
    description: "A soft, subtle, abstract geometric pattern with warm orange and teal gradients. Very light opacity, friendly and modern financial app style. Clean."
    aspect_ratio: "16:9"
  - path: "artifacts/taxmate/public/images/empty-receipts.png"
    description: "A cute, clean 3D illustration of a neat stack of paper receipts with a small potted plant next to it. Friendly, warm lighting, transparent background."
    aspect_ratio: "1:1"

notes:
  - Using generated Orval React Query hooks from @workspace/api-client-react
  - Expecting standard Wouter routing and standard Shadcn UI structure
  - File upload for receipts uses base64 string conversion before calling the API
